---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    <!-- Floating Music Player -->
    <div class="music-player">
      <button id="music-btn" class="music-player__btn" title="Play/Pause Music" aria-label="Toggle music">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
      </button>
      <audio id="bg-audio" preload="none"></audio>
    </div>

    {% include scripts.html %}

    <script>
    (function() {
      /* ========== Dark / Light Toggle ========== */
      var themeBtn = document.getElementById('theme-toggle');
      var availableThemes = ['light', 'dark', 'firework'];
      function normalizeTheme(theme) {
        return availableThemes.indexOf(theme) !== -1 ? theme : 'light';
      }
      function updateThemeIcon(theme) {
        var moon = document.getElementById('theme-icon-moon');
        var sun = document.getElementById('theme-icon-sun');
        var firework = document.getElementById('theme-icon-firework');
        if (!moon || !sun || !firework) {
          return;
        }
        moon.style.display = theme === 'dark' ? 'block' : 'none';
        sun.style.display = theme === 'light' ? 'block' : 'none';
        firework.style.display = theme === 'firework' ? 'block' : 'none';
      }
      function applyTheme(theme) {
        var normalizedTheme = normalizeTheme(theme);
        document.documentElement.setAttribute('data-theme', normalizedTheme);
        localStorage.setItem('theme', normalizedTheme);
        updateThemeIcon(normalizedTheme);
      }
      /* Init from stored preference or system */
      var stored = localStorage.getItem('theme');
      if (stored) {
        applyTheme(stored);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        applyTheme('dark');
      } else {
        applyTheme('light');
      }
      if (themeBtn) {
        themeBtn.addEventListener('click', function() {
          var current = normalizeTheme(document.documentElement.getAttribute('data-theme'));
          var nextThemeIndex = (availableThemes.indexOf(current) + 1) % availableThemes.length;
          applyTheme(availableThemes[nextThemeIndex]);
        });
      }

      /* ========== Language Toggle ========== */
      var langBtn = document.getElementById('lang-toggle');
      var currentLang = localStorage.getItem('lang') || 'en';

      function applyLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        var enEls = document.querySelectorAll('.lang-en');
        var zhEls = document.querySelectorAll('.lang-zh');
        if (lang === 'zh') {
          enEls.forEach(function(el) { el.style.display = 'none'; });
          zhEls.forEach(function(el) { el.style.display = ''; });
          if (langBtn) langBtn.textContent = 'ZH';
        } else {
          enEls.forEach(function(el) { el.style.display = ''; });
          zhEls.forEach(function(el) { el.style.display = 'none'; });
          if (langBtn) langBtn.textContent = 'EN';
        }
      }
      applyLang(currentLang);
      if (langBtn) {
        langBtn.addEventListener('click', function() {
          applyLang(currentLang === 'en' ? 'zh' : 'en');
        });
      }

      /* ========== Music Player ========== */
      var musicBtn = document.getElementById('music-btn');
      var audio = document.getElementById('bg-audio');
      var playlist = [
        '{{ base_path }}/assets/audio/soundtrack_1.mp3',
        '{{ base_path }}/tmp_folder/music_2.mp3',
        '{{ base_path }}/tmp_folder/music_3.mp3'
      ];
      var currentTrackIndex = 0;

      function loadTrack(index) {
        if (!audio || playlist.length === 0) {
          return;
        }
        currentTrackIndex = index;
        audio.src = playlist[currentTrackIndex];
        audio.load();
      }

      function playCurrentTrack() {
        if (!audio) {
          return;
        }
        audio.play().then(function() {
          if (musicBtn) {
            musicBtn.classList.add('playing');
          }
        }).catch(function() {
          if (musicBtn) {
            musicBtn.classList.remove('playing');
          }
        });
      }

      if (musicBtn && audio) {
        loadTrack(0);
        musicBtn.addEventListener('click', function() {
          if (audio.paused) {
            playCurrentTrack();
          } else {
            audio.pause();
            musicBtn.classList.remove('playing');
          }
        });
        audio.addEventListener('play', function() {
          musicBtn.classList.add('playing');
        });
        audio.addEventListener('pause', function() {
          musicBtn.classList.remove('playing');
        });
        audio.addEventListener('ended', function() {
          var nextTrackIndex = (currentTrackIndex + 1) % playlist.length;
          loadTrack(nextTrackIndex);
          playCurrentTrack();
        });
      }
    })();
    </script>

  </body>
</html>
